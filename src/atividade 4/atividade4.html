<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calcular Preço Final</title>
</head>
<body>

    <h2>Calculadora de Preço</h2>

    <label>Valor de venda:</label>
    <input type="number" id="venda"><br><br>

    <label>Custo do produto:</label>
    <input type="number" id="custoProduto"><br><br>

    <label>Custo operacional:</label>
    <input type="number" id="custoOperacional"><br><br>

    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>

    <script src="atividade4.js"></script>
    <script>

        function calcular() {
            try {
                const venda = Number(document.getElementById('venda').value);
                const custo = Number(document.getElementById('custoProduto').value);
                const operacional = Number(document.getElementById('custoOperacional').value);

                const resultado = calculateNetProfit(venda, custo, operacional);

                document.getElementById('resultado').innerText =
                    "Lucro final: " + resultado.toFixed(2);

            } catch (erro) {
                document.getElementById('resultado').innerText =
                    "Erro: " + erro.message;
            }
        }
    </script>

</body>
</html>
