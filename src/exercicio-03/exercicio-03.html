<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Frete</title>
</head>
<body>

    <h1>Calcular Frete</h1>

    <label>Peso (kg):</label>
    <input type="number" id="peso" step="0.1"><br><br>

    <label>Distância (km):</label>
    <input type="number" id="km" step="0.1"><br><br>

    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script src="exercicio-03.js"></script>

    <script>
        function calcular() {
            try {
                const peso = Number(document.getElementById('peso').value);
                const km = Number(document.getElementById('km').value);

                const frete = calculateShipping(peso, km);

                document.getElementById('resultado').innerText = 
                    "Frete: R$ " + frete.toFixed(2);
            } catch (erro) {
                document.getElementById('resultado').innerText = erro.message;
            }
        }
    </script>

</body>
</html>
