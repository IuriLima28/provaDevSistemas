<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calcular Preço Final</title>
</head>
<body>

    <h2>Calculadora de Preço</h2>

    <label>Investimento:</label>
    <input type="number" id="investimento"><br><br>

    <label>Receita:</label>
    <input type="number" id="receita"><br><br>

    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>

    <script src="atividade5.js"></script>
    <script>

        function calcular() {
            try {
                const custo = Number(document.getElementById('investimento').value);
                const lucro = Number(document.getElementById('receita').value);

                const resultado = calculateROI(custo, lucro);

                document.getElementById('resultado').innerText =
                    "ROI: " + resultado.toFixed(2) + "%";

            } catch (erro) {
                document.getElementById('resultado').innerText =
                    "Erro: " + erro.message;
            }
        }
    </script>

</body>
</html>
